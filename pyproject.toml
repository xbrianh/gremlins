[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "wf-gremlins"
version = "0.1.0"
description = "Background plan/implement/review/address pipelines for Claude Code"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["openai-agents", "platformdirs", "pyyaml"]

[project.urls]
Homepage = "https://github.com/amorphous-industries/gremlins"
Repository = "https://github.com/amorphous-industries/gremlins"
Issues = "https://github.com/amorphous-industries/gremlins/issues"

[project.optional-dependencies]
dev = ["pytest", "ruff", "pyright"]

[project.scripts]
gremlins = "gremlins.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["gremlins"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "TID"]
ignore = ["E501"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.pyright]
typeCheckingMode = "strict"
include = [
    "gremlins",
]
