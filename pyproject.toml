[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "gremlins"
version = "0.1.0"
description = "Background plan/implement/review/address pipelines for Claude Code"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "ruff", "pyright"]

[project.scripts]
gremlins = "gremlins.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["gremlins"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pyright]
typeCheckingMode = "strict"
# TODO: these modules need strict-mode cleanup; excluded to land this pass cleanly.
# Pick them off in follow-on PRs.
exclude = [
    "gremlins/fleet/land.py",
    "gremlins/fleet/rescue.py",
    "gremlins/fleet/views.py",
    "gremlins/fleet/render.py",
    "gremlins/fleet/__init__.py",
    "gremlins/fleet/session_summary.py",
    "gremlins/stages/commit_pr.py",
    "gremlins/clients/claude.py",
    "gremlins/clients/fake.py",
    "gremlins/git.py",
    "gremlins/launcher.py",
    "gremlins/gh_utils.py",
    "gremlins/handoff.py",
    "tests",
]
