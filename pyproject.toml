[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "gremlins"
version = "0.1.0"
description = "Background plan/implement/review/address pipelines for Claude Code"
requires-python = ">=3.11"
dependencies = ["pyyaml"]

[project.optional-dependencies]
dev = ["pytest", "ruff", "pyright"]

[project.scripts]
gremlins = "gremlins.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["gremlins"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pyright]
typeCheckingMode = "strict"
exclude = [
    "tests",
]
