# Relies on LoopStage's head_stable exit predicate — only use in pipeline
# positions where HEAD does not move between poll iterations.

stages:
  - name: github-wait-copilot
    type: loop
    max-iterations: "{{options.max_iterations | default(40)}}"
    body:
      - name: poll
        type: exec
        in:
          pr_number: pr-number
        out:
          status: "file://session/status"
        options:
          interval: "{{options.interval | default(\"20\")}}"
          cmds:
            - |
              repo=$(gh repo view --json nameWithOwner -q .nameWithOwner)
              review=$(timeout 30 gh api "repos/$repo/pulls/$pr_number/reviews" \
                --jq '.[] | select(.user.login | test("[Cc]opilot")) | .state | select(. != "PENDING")')
              [ -n "$review" ] && exit 0
              sleep {interval}
              exit 1
