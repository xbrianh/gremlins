required-prompt: true

stages:
  - name: github-wait-ci
    type: loop
    max-iterations: 3
    in:
      pr_url: pr-url
      pr_branch: pr-branch
    body:
      - { type: gremlins:github-poll-ci, in: { pr_url: pr-url } }
      - name: fix
        type: agent
        prompt: ["{{prompt}}"]
        in: { failure_output: ci_log, pr_branch: pr-branch }
      - name: capture-head
        type: exec
        out: { fix_head: "file://session/fix-head" }
        options: { cmds: ['git rev-parse HEAD > "{session_dir}/fix-head"'] }
