stages:
  - name: resolve-pr-base
    type: exec
    in:
      prev_branch: pr.branch?
    out:
      base_ref_to_open_pr: "file://session/pr-base-ref.txt"
    options:
      cmds:
        - 'printf "%s" "${prev_branch:-{base_ref}}" > "{session_dir}/pr-base-ref.txt"'

  - name: compose-pr
    type: agent
    in:
      base_ref_to_open_pr: base_ref_to_open_pr
      plan_uri:            plan.uri?
    out:
      pr_title:  "file://session/pr-title.txt"
      pr_body:   "file://session/pr-body.md"
      pr_branch: "file://session/pr-branch.txt"
    prompt:
      - gremlins:github_open_pull_request.md

  - name: push-and-open
    type: exec
    in:
      base_ref_to_open_pr: base_ref_to_open_pr
    out:
      pr-number: "file://session/pr-number.txt"
      pr: "gh://pr/{read:pr-number}"
    options:
      cmds:
        - |
          BASE="$(cat "{session_dir}/pr-branch.txt")" &&
          SUFFIX=$([ "{loop_iteration}" -gt 1 ] && echo "-iter{loop_iteration}" || echo "") &&
          BRANCH="${BASE}${SUFFIX}" &&
          git push origin "HEAD:refs/heads/$BRANCH" &&
          URL="$(gh pr create --head "$BRANCH" --base "$base_ref_to_open_pr" --title "$(cat "{session_dir}/pr-title.txt")" --body-file "{session_dir}/pr-body.md")" &&
          printf "%s" "${URL##*/}" > "{session_dir}/pr-number.txt"
