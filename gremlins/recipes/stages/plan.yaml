required-prompt: true

stages:
  - name: resolve-plan-input
    type: exec
    in:
      plan_arg: "plan_arg?"
    options:
      cmds:
        - |
          if [ -s "{session_dir}/plan.md" ]; then exit 0; fi
          if [ -z "$plan_arg" ]; then exit 0; fi
          if [ -f "$plan_arg" ]; then
              cp "$plan_arg" "{session_dir}/plan.md"
          elif echo "$plan_arg" | grep -qE '^([^/]+/[^#]+)?#[0-9]+$'; then
              gh issue view "$plan_arg" --json body --jq .body \
                > "{session_dir}/plan.md"
          else
              printf 'resolve-plan-input: unrecognized plan_arg: %s\n' "$plan_arg" >&2
              exit 1
          fi

  - name: plan
    type: agent
    prompt:
      - "{{prompt}}"
    out:
      plan: "file://session/plan.md"
    options:
      idle_timeout: 600

  - name: update-description
    type: exec
    options:
      cmds:
        - |
          command -v jq >/dev/null 2>&1 || exit 0
          STATE_JSON="{session_dir}/../state.json"
          if ! [ -f "$STATE_JSON" ]; then exit 0; fi
          if jq -e '.description_explicit' "$STATE_JSON" >/dev/null 2>&1; then exit 0; fi
          title=$(head -1 "{session_dir}/plan.md" | sed 's/^#\+ *//' | cut -c1-60)
          [ -z "$title" ] && exit 0
          tmp=$(mktemp) && jq --arg t "$title" '.description = $t' \
            "$STATE_JSON" > "$tmp" && mv "$tmp" "$STATE_JSON"
