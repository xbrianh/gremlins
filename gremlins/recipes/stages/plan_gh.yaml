required-prompt: true

stages:
  - name: resolve-plan-input
    type: exec
    in:
      plan: "plan?"
    options:
      cmds:
        - |
          if [ -s "{artifact_dir}/plan.md" ]; then exit 0; fi
          if [ -z "$plan" ]; then exit 0; fi
          if [ -f "$plan" ]; then
              cp "$plan" "{artifact_dir}/plan.md"
          elif echo "$plan" | grep -qE '^#[0-9]+$'; then
              gh issue view "$plan" --json body --jq .body \
                > "{artifact_dir}/plan.md"
              if ! head -1 "{artifact_dir}/plan.md" | grep -q '^# '; then
                  title=$(gh issue view "$plan" --json title --jq .title)
                  { printf '# %s\n\n' "$title"; cat "{artifact_dir}/plan.md"; } > "{artifact_dir}/plan.md.tmp"
                  mv "{artifact_dir}/plan.md.tmp" "{artifact_dir}/plan.md"
              fi
              gh issue view "$plan" --json number --jq .number \
                > "{artifact_dir}/plan-issue-number.txt"
          else
              printf 'resolve-plan-input: unrecognized plan: %s\n' "$plan" >&2
              exit 1
          fi
    out:
      plan-issue-number?: "file://session/plan-issue-number.txt"
      plan-document?: "gh://issue/{read:plan-issue-number}"  # must follow plan-issue-number? — {read:plan-issue-number} interpolates it

  - name: plan
    type: agent
    skip_if_exists: plan-document
    prompt:
      - "{{prompt}}"
    in:
      instructions: "instructions?"
    out:
      plan-document: "file://session/plan.md"
    options:
      idle_timeout: 600

  - name: publish-as-issue
    type: exec
    skip_if_exists: plan-issue-number
    options:
      cmds:
        - |
          if ! [ -s "{artifact_dir}/plan.md" ]; then
              printf 'publish-as-issue: plan.md is empty\n' >&2; exit 1
          fi
          title=$(awk '/^# /{sub(/^#+ */,""); print; exit}' "{artifact_dir}/plan.md" | cut -c1-80)
          if [ -z "$title" ]; then
              printf 'publish-as-issue: plan.md has no H1 title\n' >&2; exit 1
          fi
          url=$(gh issue create \
              --body-file "{artifact_dir}/plan.md" \
              --title "$title")
          printf '%s' "${url##*/}" > "{artifact_dir}/plan-issue-number.txt"
    out:
      plan-issue-number: "file://session/plan-issue-number.txt"
      plan-document?: "gh://issue/{read:plan-issue-number}"

  - name: update-description
    type: exec
    options:
      cmds:
        - |
          STATE_JSON="{artifact_dir}/../state.json"
          if ! [ -f "$STATE_JSON" ]; then exit 0; fi
          if python3 -c "import json,sys; d=json.load(open(sys.argv[1])); sys.exit(0 if d.get('description_explicit') else 1)" "$STATE_JSON" >/dev/null 2>&1; then exit 0; fi
          title=$(awk '/^# /{sub(/^#+ */,""); print; exit}' "{artifact_dir}/plan.md" | cut -c1-60)
          [ -z "$title" ] && exit 0
          tmp=$(mktemp) && python3 -c "import json,sys; d=json.load(open(sys.argv[1])); d['description']=sys.argv[2]; print(json.dumps(d))" "$STATE_JSON" "$title" > "$tmp" && mv "$tmp" "$STATE_JSON"
