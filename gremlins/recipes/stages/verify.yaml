required-options:
  - cmds
required-prompt: true

stages:
  - name: verify
    type: loop
    max-iterations: 3
    body:
      - name: cmd
        type: exec
        out:
          verify_log: "file://session/exec-{name}.log"
          status: "file://session/exec-{name}.status"
        options:
          cmds:
            - "{{options.cmds}}"
            - |
              _rc=$?
              case $_rc in
                0) echo pass > "{session_dir}/exec-{name}.status" ;;
                1) echo needs_fix > "{session_dir}/exec-{name}.status" ;;
                *) exit $_rc ;;
              esac
      - name: verify-diff
        type: exec
        out:
          verify_diff: "file://session/verify-diff.txt"
        options:
          cmds:
            - 'git diff HEAD > "{session_dir}/verify-diff.txt"; [ -s "{session_dir}/verify-diff.txt" ] || printf "(no uncommitted changes)\n" > "{session_dir}/verify-diff.txt"'
      - name: fix
        type: agent
        prompt:
          - "{{prompt}}"
        in:
          verify_output: verify_log
          diff_text: verify_diff
