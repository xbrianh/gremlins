default_client: claude:sonnet

base_ref: main

prompts:
  code-style: gremlins:code_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stage-definitions:
  implement: gremlins:implement

stages:
  - { type: plan,       prompt: [code-style, gremlins:plan_gh.md] }
  - { type: implement,  prompt: [code-style, gremlins:implement_gh.md] }
  - name: normalize
    type: exec
    options:
      cmds:
        - "ruff format ."
        - "ruff check --fix ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
    out:
      normalize-commits: git://range
  - { type: verify,     options: { cmds: ["make check", "make test"] }, prompt: verify }
  - { name: open-pr,    type: github-open-pull-request, out: {pr: gh://pr} }
  - { type: github-request-copilot-review,              in: {pr: pr} }
  - { name: github-review-pull-request,                 type: agent, in: {pr: pr}, prompt: [code-style, gremlins:github_review_pull_request.md] }
  - { type: github-wait-copilot,                        in: {pr: pr} }
  - { name: github-address-pull-request-reviews,        type: agent, in: {pr: pr}, prompt: [code-style, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { name: ci-gate,    type: github-wait-ci,           in: {pr: pr}, prompt: [gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
