default_client: claude:sonnet

base_ref: main

inputs:
  in:
    INSTRUCTIONS: instructions?
    PLAN: plan?
    PR: pr?

land:
  in:
    PR_URL: pr.url
  options:
    cmds:
      - gh pr merge --squash --delete-branch "$PR_URL"

prompts:
  code-style: gremlins:code_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stages:
  - { type: gremlins:plan-gh,      prompt: [code-style, gremlins:plan_gh.md] }
  - { type: gremlins:implement,   prompt: [code-style, gremlins:implement_gh.md] }
  - name: normalize
    type: exec
    options:
      cmds:
        - "ruff format . && ruff check --fix . && git add -A && (git diff --cached --quiet || git commit -m 'normalize')"
    out:
      normalize-commits: git://range
  - { type: verify,     options: { cmds: ["make check && make test"] }, prompt: verify }
  - { name: open-pr,    type: gremlins:github-open-pr }
  - { type: gremlins:github-request-copilot-review }
  - { name: github-review-pull-request,                 type: agent, in: {pr: pr}, prompt: [code-style, gremlins:github_review_pull_request.md] }
  - { type: gremlins:github-wait-copilot,                in: {pr: pr} }
  - { name: github-address-pull-request-reviews,        type: agent, in: {pr: pr}, prompt: [code-style, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { name: ci-gate,    type: gremlins:github-wait-ci,  in: {pr: pr}, prompt: [gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
