name: gh

default_client: claude:sonnet

base_ref: main

prompts:
  code-style: gremlins:code_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stages:
  - { name: plan,            type: plan,            prompt: [code-style, gremlins:plan_gh.md] }
  - { name: implement,       type: implement,       prompt: [code-style, gremlins:implement_gh.md] }
  - { name: verify,          type: verify,          options: { cmds: ["make check", "make test"] }, prompt: verify }
  - { name: open-pr,         type: github-open-pull-request }
  - { name: github-request-copilot-review, type: github-request-copilot-review }
  - { name: ghreview,        type: ghreview,        prompt: [code-style, gremlins:review_gh.md] }
  - { name: github-wait-copilot, type: github-wait-copilot }
  - { name: ghaddress,       type: ghaddress,       prompt: [code-style, gremlins:address_gh.md, gremlins:bail_section.md] }
  - { name: ci-gate,         type: github-wait-ci,  prompt: [gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
