default_client: claude:sonnet

base_ref: current

github_integration: true

prompts:
  code-style: gremlins:code_style.md

stages:
  - name: chain
    type: loop
    body:
      - name: detach-prior-pr
        type: exec
        in: { branch: pr-branch? }
        options:
          cmds:
            - |
              if [ -n "${branch:-}" ]; then
                git fetch origin "$branch" && git checkout --detach "origin/$branch"
              fi
      - { name: handoff, type: gremlins:handoff }
      - { include: gh }

  - name: review-chain
    type: review-code
    prompt: [code-style, gremlins:review/chain.md]

  - name: address-chain
    type: agent
    prompt: [code-style, gremlins:address.md, gremlins:bail_section.md]
    in: {text: review-chain}
