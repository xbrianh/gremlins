name: boss

default_client: claude:sonnet

base_ref: current

stages:
  - name: chain
    type: loop
    body:
      - { name: handoff, type: handoff }
      - { include: local }

  - name: review-chain
    type: review-code
    prompt: [gremlins:code_style.md, gremlins:review/chain.md]

  - name: address-chain
    type: address-code
    prompt: [gremlins:code_style.md, gremlins:address.md, gremlins:bail_section.md]
