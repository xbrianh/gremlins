name: local

default_client: claude:sonnet

base_ref: current

stages:
  - { name: plan,         type: plan,         prompt: [gremlins:code_style.md, gremlins:plan.md] }
  - { name: implement,    type: implement,    prompt: [gremlins:code_style.md, gremlins:implement_local.md] }
  - { name: review-code,  type: review-code,  prompt: [gremlins:code_style.md, gremlins:review/detail.md] }
  - { name: address-code, type: address-code, prompt: [gremlins:code_style.md, gremlins:address.md, gremlins:bail_section.md] }
  - { name: verify,       type: verify,       prompt: [gremlins:verify_fix.md, gremlins:bail_section_fix.md] }
