default_client: claude:sonnet

base_ref: current

inputs:
  in:
    INSTRUCTIONS: instructions?
    PLAN: plan?

prompts:
  code-style: gremlins:code_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stages:
  - { type: plan,                prompt: [code-style, gremlins:plan.md] }
  - { type: gremlins:implement,  prompt: [code-style, gremlins:implement_local.md] }
  - { type: review-code,  prompt: [code-style, gremlins:review/detail.md] }
  - { name: address-code, type: agent, prompt: [code-style, gremlins:address.md, gremlins:bail_section.md], in: {text: review-code} }
  - name: normalize
    type: exec
    options:
      cmds:
        - "ruff format . && ruff check --fix . && git add -A && (git diff --cached --quiet || git commit -m 'normalize')"
    out:
      normalize-commits: git://range
  - { type: verify, options: { cmds: ["make check && make test"] }, prompt: verify }
