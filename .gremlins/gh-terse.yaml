default_client: claude:haiku
base_ref: main
github_integration: true
prompt_dir: prompts

inputs:
  in:
    INSTRUCTIONS: instructions?
    PLAN: plan?
    PR: pr?

land:
  in:
    PR_URL: pr-url
  options:
    cmds:
      - gh pr merge --squash --delete-branch "$PR_URL"
      - git fetch origin
      - git branch -f main origin/main 2>/dev/null || git merge --ff-only origin/main

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md

stage-definitions:
  normalize:
    type: exec
    options:
      cmds:
        - "ruff format ."
        - "ruff check --fix --exit-zero ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"

  run-checks-and-fix:
    required-options:
      - cmds
    stages:
      - name: verify
        type: loop
        max-iterations: 7
        body:
          - name: cmd
            type: exec
            out:
              verify_log: "file://session/exec-{name}.log"
              status: "file://session/exec-{name}.status"
            options:
              cmds:
                - "{{options.cmds}}"
          - name: fix
            type: agent
            prompt:
              - gremlins:verify_fix.md
              - gremlins:bail_section_fix.md
            in:
              verify_output: verify_log

  normalize-and-fix:
    stages:
      - { type: normalize }
      - { type: run-checks-and-fix, options: { cmds: ["make check", "make test"] } }

stages:
  - { type: gremlins:plan-gh, prompt: [code-style, terse, gremlins:plan_gh.md] }
  - { type: gremlins:implement, prompt: [code-style, terse, gremlins:implement_gh.md] }

  - parallel:
      - name: local-review
        type: agent
        prompt: [code-style, terse, local_review.md]
        out:
          local-review: "file://session/local-review.md"
      - name: local-review-complexity
        type: agent
        prompt: [code-style, terse, local_review_complexity.md]
        out:
          local-review-complexity: "file://session/local-review-complexity.md"

  - name: local-address
    type: agent
    prompt: [code-style, terse, local_address.md, gremlins:bail_section.md]
    in:
      review: local-review
      complexity: local-review-complexity

  - { type: normalize-and-fix }

  - { type: gremlins:github-open-pr }
  - { type: gremlins:github-request-copilot-review }

  - parallel:
      - { type: gremlins:github-wait-copilot, in: {pr: pr} }
      - { name: github-review-pull-request, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_review_pull_request.md], client: claude:sonnet }
      - { name: github-review-pull-request-complexity, type: agent, in: {pr: pr}, prompt: [code-style, terse, complexity_review.md], client: claude:sonnet }

  - { name: github-address-pull-request-reviews, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { type: normalize-and-fix }
  - { type: gremlins:github-wait-ci, in: {pr: pr}, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
