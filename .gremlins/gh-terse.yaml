default_client: claude:sonnet
base_ref: main
prompt_dir: prompts

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stages:
  - { type: plan,      prompt: [code-style, terse, gremlins:plan_gh.md] }
  - { type: implement, prompt: [code-style, terse, gremlins:implement_gh.md] }
  - name: normalize
    type: exec
    options:
      cmds:
        - "ruff format ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
    out:
      normalize-commits: git://range
  - { type: verify,    options: { cmds: ["make check", "make test"] }, prompt: verify }
  - { name: open-pr,   type: github-open-pull-request, out: {pr: gh://pr} }
  - { type: github-request-copilot-review, in: {pr: pr} }

  - parallel:
      - { type: github-wait-copilot, in: {pr: pr} }
      - { type: github-review-pull-request, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_review_pull_request.md] }
      - { type: github-review-pull-request, in: {pr: pr}, client: claude:sonnet, prompt: [code-style, terse, complexity_review.md] }

  - { type: github-address-pull-request-reviews, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - name: normalize-post-review
    type: exec
    options:
      cmds:
        - "ruff format ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
    out:
      normalize-commits: git://range
  - { name: ci-gate, type: github-wait-ci, in: {pr: pr}, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
