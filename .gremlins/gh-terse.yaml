default_client: claude:sonnet
base_ref: main
prompt_dir: prompts

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stages:
  - { type: plan,      prompt: [code-style, terse, gremlins:plan_gh.md] }
  - { type: implement, prompt: [code-style, terse, gremlins:implement_gh.md] }
  - type: exec
    options:
      cmds:
        - "ruff format ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
  - { type: verify,    options: { cmds: ["make check", "make test"] }, prompt: verify }
  - { type: github-draft-pull-request }
  - name: create-pr
    type: exec
    options:
      cmds:
        - 'HEAD=$(jq -r .head "$GREMLINS_SESSION_DIR/pr-draft.json")'
        - 'BASE=$(jq -r .base "$GREMLINS_SESSION_DIR/pr-draft.json")'
        - 'jq -r .body "$GREMLINS_SESSION_DIR/pr-draft.json" > "$GREMLINS_SESSION_DIR/pr-body.md"'
        - 'gh pr create --head "$HEAD" --base "$BASE" --title "$(jq -r .title "$GREMLINS_SESSION_DIR/pr-draft.json")" --body-file "$GREMLINS_SESSION_DIR/pr-body.md"'
    out:
      pr: gh://pr
  - name: copilot-review
    type: exec
    in:
      PR_NUM: pr.number
    options:
      cmds:
        - "gh pr edit $PR_NUM --add-reviewer copilot-pull-request-reviewer"

  - parallel:
      - { type: github-wait-copilot }
      - { type: github-review-pull-request, prompt: [code-style, terse, gremlins:github_review_pull_request.md] }
      - { type: github-review-pull-request, client: claude:sonnet, prompt: [code-style, terse, complexity_review.md] }

  - { type: github-address-pull-request-reviews, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - type: exec
    options:
      cmds:
        - "ruff format ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
  - { type: github-wait-ci, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
