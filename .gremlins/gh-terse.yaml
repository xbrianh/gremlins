default_client: xai:grok-4
base_ref: main
github_integration: true
prompt_dir: prompts

inputs:
  in:
    INSTRUCTIONS: instructions?
    PLAN: plan?
    PR: pr?

land:
  in:
    PR_URL: pr-url
  options:
    cmds:
      - gh pr merge --squash --delete-branch "$PR_URL"
      - git fetch origin
      - git branch -f main origin/main 2>/dev/null || git merge --ff-only origin/main

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

stage-definitions:
  normalize:
    type: exec
    options:
      cmds:
        - "ruff format ."
        - "ruff check --fix ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"

  normalize-and-verify:
    stages:
      - { type: normalize }
      - { type: verify, options: { cmds: ["make check", "make test"] }, prompt: verify }

  github-wait-ci:
    required-prompt: true
    stages:
      - name: github-wait-ci
        type: loop
        max-iterations: 3
        in: { pr_url: pr-url, pr_branch: pr-branch }
        body:
          - { type: gremlins:github-poll-ci, in: { pr_url: pr-url } }
          - name: fix
            type: agent
            prompt: ["{{prompt}}"]
            in: { failure_output: ci_log, pr_branch: pr-branch }
          - { type: normalize-and-verify }
          - { type: gremlins:github-push-to-pr-branch, in: { branch: pr-branch } }
          - name: capture-head
            type: exec
            out: { fix_head: "file://session/fix-head" }
            options: { cmds: ['git rev-parse HEAD > "{session_dir}/fix-head"'] }

stages:
  - { type: gremlins:plan-gh, prompt: [code-style, terse, gremlins:plan_gh.md] }
  - { type: gremlins:implement, prompt: [code-style, terse, gremlins:implement_gh.md] }
  - { type: normalize-and-verify }

  - parallel:
      - { name: local-review, type: agent, out: { "{name}": "file://session/{name}.md" }, prompt: [code-style, terse, local_review.md, gremlins:bail_section.md] }
      - { name: local-review-complexity, type: agent, out: { "{name}": "file://session/{name}.md" }, prompt: [code-style, terse, local_review_complexity.md, gremlins:bail_section.md] }

  - { name: local-address, type: agent, prompt: [code-style, terse, local_address.md, gremlins:bail_section.md], in: {review: local-review, complexity: local-review-complexity} }
  - { type: normalize-and-verify }

  - { type: gremlins:github-open-pr }
  - { type: gremlins:github-request-copilot-review }

  - parallel:
      - { type: gremlins:github-wait-copilot, in: {pr: pr} }
      - { name: github-review-pull-request, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_review_pull_request.md] }
      - { name: github-review-pull-request-complexity, type: agent, in: {pr: pr}, prompt: [code-style, terse, complexity_review.md], client: claude:sonnet }

  - { name: github-address-pull-request-reviews, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { type: normalize }
  - { type: github-wait-ci, in: {pr: pr}, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
