default_client: claude:sonnet
base_ref: current

prompt_dir: prompts

prompts:
  code-style: gremlins:code_style.md
  small-diffs: small_diffs.md

stages:
  - name: chain
    type: loop
    options:
      max_iterations: 30
    body:
      - name: detach-prior-pr
        type: exec
        options:
          cmds:
            - |
              if [ -f "{session_dir}/pr-branch.txt" ]; then
                branch="$(cat "{session_dir}/pr-branch.txt")"
                if [ -n "$branch" ]; then
                  git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch" && git checkout --detach "origin/$branch"
                fi
              fi
      - { name: handoff, type: gremlins:handoff, client: claude:opus }
      - { include: gh-terse }

  - name: review-chain
    type: review-code
    client: claude:opus
    prompt: [code-style, gremlins:review/chain.md]

  - name: address-chain
    type: agent
    prompt: [code-style, gremlins:address.md, gremlins:bail_section.md]
    in: {text: review-chain}
