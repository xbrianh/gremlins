default_client: claude:sonnet
base_ref: current

prompt_dir: prompts

prompts:
  code-style: gremlins:code_style.md
  small-diffs: small_diffs.md

stages:
  - name: chain
    type: loop
    options:
      max_iterations: 30
    body:
      - name: detach-prior-pr
        type: exec
        in: { branch: pr-branch? }
        options:
          cmds:
            - |
              if [ -n "${branch:-}" ]; then
                git fetch origin "$branch" && git checkout --detach "origin/$branch"
              fi
      - { name: handoff, type: gremlins:handoff, client: claude:opus }
      - { include: gh-terse }

  - name: review-chain
    type: review-code
    client: claude:opus
    prompt: [code-style, gremlins:review/chain.md]

  - name: address-chain
    type: agent
    prompt: [code-style, gremlins:address.md, gremlins:bail_section.md]
    in: {text: review-chain}
