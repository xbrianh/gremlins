default_client: claude:sonnet
base_ref: main
prompt_dir: prompts

land:
  in:
    PR_URL: pr-url
  options:
    cmds:
      - gh pr merge --squash --delete-branch "$PR_URL"

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md

# Usage:
#   gremlins resume --graft gh-address <gremlin_id>
#
# Re-runs the address-reviews / format / wait-CI tail of gh-terse.yaml.
# Use when reviewer comments on an existing PR need another pass.

stages:
  - { name: github-address-pull-request-reviews, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - type: exec
    options:
      cmds:
        - "ruff format ."
        - "git add -A"
        - "git diff --cached --quiet || git commit -m 'normalize'"
  - { type: gremlins:github-wait-ci, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
