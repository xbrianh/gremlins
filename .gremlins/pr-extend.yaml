default_client: claude:sonnet

base_ref: main

prompt_dir: prompts

inputs:
  in:
    INSTRUCTIONS: instructions?
    PLAN: plan?
    PR: pr
  sources:
    plan:
      type: filepath
      optional: true

land:
  in:
    PR_URL: pr-url
  options:
    cmds:
      - gh pr merge --squash --delete-branch "$PR_URL"

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

# Usage:
#   gremlins launch pr-extend --pr <num|url> --plan '#<issue>'
#
# --pr is the PR to extend; its head is checked out in the gremlin's detached
# worktree. --plan supplies the acceptance criteria (the issue the PR is meant
# to fully satisfy). The pipeline adds new commits on top and pushes back to
# the PR's branch (no rebase, no history rewrite — additive only). Same-repo
# PRs only; fork PRs would need push access to the fork.

stages:
  - name: fetch-pr-info
    type: exec
    in:
      pr_uri: pr.uri
    out:
      pr-url:    "file://session/pr-url.txt"
      pr-branch: "file://session/pr-branch.txt"
      pr-number: "file://session/pr-number.txt"
    options:
      cmds:
        - |
          PR_NUM="${pr_uri##*/}" &&  # gh://pr/N — strip trailing segment to get number
          PR_JSON="$(gh pr view "$PR_NUM" --json url,headRefName,number)" &&
          printf "%s" "$(printf '%s' "$PR_JSON" | jq -r '.url')" > "{artifact_dir}/pr-url.txt" &&
          printf "%s" "$(printf '%s' "$PR_JSON" | jq -r '.headRefName')" > "{artifact_dir}/pr-branch.txt" &&
          printf "%s" "$(printf '%s' "$PR_JSON" | jq -r '.number')" > "{artifact_dir}/pr-number.txt"
  - { type: gremlins:plan-gh, prompt: [code-style, terse, gremlins:plan_gh.md] }
  - { type: gremlins:implement, prompt: [code-style, terse, no_lint_in_implement.md, implement_pr_extension.md] }
  - { type: verify,             options: { cmds: ["make check", "make test"] }, prompt: verify }
  - { name: push, type: gremlins:github-push-to-pr-branch }

  - { type: gremlins:github-request-copilot-review,  in: {pr: pr} }

  - parallel:
      - { type: gremlins:github-wait-copilot,          in: {pr: pr} }
      - { name: github-review-pull-request,          type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_review_pull_request.md] }
      - { name: github-review-pull-request-complexity, type: agent, client: claude:sonnet, in: {pr: pr}, prompt: [code-style, terse, complexity_review.md] }

  - { name: github-address-pull-request-reviews, type: agent, in: {pr: pr}, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { type: gremlins:github-wait-ci, in: {pr: pr}, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
