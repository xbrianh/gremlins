default_client: claude:sonnet

base_ref: main

prompt_dir: prompts

prompts:
  code-style: gremlins:code_style.md
  terse: terse_style.md
  verify: [gremlins:verify_fix.md, gremlins:bail_section_fix.md]

# Usage:
#   PR_NUM=697 gremlins launch pr-extend --plan '#694'
#
# PR_NUM is the PR to extend. --plan supplies the acceptance criteria (the
# issue the PR is meant to fully satisfy). The pipeline fetches the PR head
# into the gremlin's detached worktree, adds new commits on top, and pushes
# back to the PR's branch (no rebase, no history rewrite — additive only).
# Same-repo PRs only; fork PRs would need push access to the fork.

stages:
  - { type: plan, prompt: [code-style, terse, gremlins:plan_gh.md] }

  - type: cmd
    options:
      cmds:
        - 'test -n "${PR_NUM:-}" || { echo "PR_NUM env var required" >&2; exit 1; }'
        - 'git fetch origin "pull/${PR_NUM}/head"'
        - 'git reset --hard FETCH_HEAD'

  - { type: implement, prompt: [code-style, terse, implement_pr_extension.md] }
  - { type: verify,    options: { cmds: ["make check"] }, prompt: verify }

  - type: cmd
    options:
      cmds:
        - 'git push origin "HEAD:refs/heads/$(gh pr view "$PR_NUM" --json headRefName --jq .headRefName)"'

  - { type: github-request-copilot-review }

  - parallel:
      - { type: github-wait-copilot }
      - { type: github-review-pull-request, prompt: [code-style, terse, gremlins:github_review_pull_request.md] }
      - { type: github-review-pull-request, client: claude:sonnet, prompt: [code-style, terse, complexity_review.md] }

  - { type: github-address-pull-request-reviews, prompt: [code-style, terse, gremlins:github_address_pull_request_reviews.md, gremlins:bail_section.md] }
  - { type: github-wait-ci, prompt: [terse, gremlins:ci_fix.md, gremlins:bail_section_fix.md] }
