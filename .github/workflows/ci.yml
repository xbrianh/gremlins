name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Build and install native extension
        run: cd crates/gremlins-core && maturin build --profile ci && pip install --force-reinstall target/wheels/*.whl
      - name: Lint, format, type-check, clippy, rustfmt
        run: make check
      - name: Test (Rust + Python)
        run: make test
