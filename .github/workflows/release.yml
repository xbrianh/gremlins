name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to a commit not on main."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release version: ${VERSION}"
          for f in pyproject.toml crates/gremlins-core/Cargo.toml crates/gremlins-core/pyproject.toml; do
            tmp=$(mktemp)
            sed "s/^version = \"0.0.0\"$/version = \"${VERSION}\"/" "$f" > "$tmp"
            mv "$tmp" "$f"
            grep -q "^version = \"${VERSION}\"" "$f" || { echo "::error::Version stamp failed for $f"; exit 1; }
          done

      - name: Update Cargo.lock for stamped version
        run: cargo check

      - name: Install maturin
        run: pip install maturin

      - name: Build gremlins-ai (pure Python sdist)
        run: |
          rm -rf dist/
          uv build --sdist

      - name: Build gremlins-core (native extension sdist)
        run: |
          maturin sdist -o dist -m crates/gremlins-core/Cargo.toml

      - name: Assert dist contains exactly two distributions
        run: |
          count=0
          for f in dist/*.tar.gz dist/*.whl; do
            [ -f "$f" ] && ((count++))
          done
          if [ "$count" != "2" ]; then
            echo "::error::Expected exactly 2 distributions in dist/, found $count"
            ls -la dist/
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
